name: deep_link_orchestrator
description: >
  A modular, type-safe deep link orchestration package for Flutter.
  Handles validation, deduplication, authentication gating,
  and dispatching with pluggable sources, policies, and handlers.
version: 1.0.0

repository: https://github.com/huraira-younas/deep_link_orchestrator

topics:
  - universal-links
  - deep-linking
  - navigation
  - app-links

environment:
  sdk: ^3.10.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  app_links: ^7.0.0
